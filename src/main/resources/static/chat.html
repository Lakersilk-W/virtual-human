<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小语 · Virtual Human</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    max-width: 720px; margin: 0 auto; padding: 20px;
    background: #fafafa; color: #222;
  }
  h2 { margin: 0 0 4px 0; }
  .subtitle { color: #888; font-size: 13px; margin-bottom: 16px; }
  #chat {
    background: white; border-radius: 8px; padding: 16px;
    height: 60vh; overflow-y: auto; margin-bottom: 12px;
    border: 1px solid #e8e8e8;
  }
  .msg { margin-bottom: 14px; }
  .msg .who { font-size: 11px; color: #999; margin-bottom: 4px; }
  .msg .body {
    padding: 10px 14px; border-radius: 8px;
    white-space: pre-wrap; line-height: 1.55;
    word-break: break-word;
  }
  .msg.user .body { background: #e3f2fd; max-width: 80%; margin-left: auto; }
  .msg.user .who { text-align: right; }
  .msg.ai .body { background: #f4f4f6; max-width: 90%; }
  .meta { font-size: 11px; color: #aaa; margin-top: 4px; }
  #form { display: flex; gap: 8px; }
  #input {
    flex: 1; padding: 10px 12px; font-size: 14px;
    border: 1px solid #ccc; border-radius: 6px;
    font-family: inherit;
  }
  button {
    padding: 10px 18px; font-size: 14px;
    background: #1976d2; color: white; border: none;
    border-radius: 6px; cursor: pointer;
  }
  button:disabled { background: #aaa; cursor: not-allowed; }
  .controls { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; font-size: 13px; }
  .controls label { color: #666; }
  .cursor { display: inline-block; width: 8px; background: #888; animation: blink 1s infinite; }
  @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
</style>
</head>
<body>
  <h2>小语 · Virtual Human</h2>
  <div class="subtitle">vh #1 · DeepSeek + LangChain4j · Intent → Router → Worker</div>

  <div class="controls">
    <label>conversationId: <span id="conv-id">(new)</span></label>
    <button onclick="reset()" style="padding:4px 10px; background:#888;">新会话</button>
    <button onclick="window.location.href='/traces.html'" style="padding:4px 10px; background:#7c4dff;">查看 trace</button>
  </div>

  <div id="chat"></div>

  <form id="form" onsubmit="event.preventDefault(); send();">
    <input id="input" placeholder="问点什么... (Enter 发送)" autocomplete="off" />
    <button id="btn" type="submit">发送</button>
  </form>

<script>
const VH_ID = 1;
let conversationId = null;
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const btn = document.getElementById('btn');
const convIdLabel = document.getElementById('conv-id');

function reset() {
  conversationId = null;
  convIdLabel.textContent = '(new)';
  chat.innerHTML = '';
}

function appendMsg(role, text) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  wrap.innerHTML = `
    <div class="who">${role === 'user' ? '我' : '小语'}</div>
    <div class="body"></div>
    <div class="meta"></div>
  `;
  wrap.querySelector('.body').textContent = text;
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  return wrap;
}

async function send() {
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  btn.disabled = true;

  appendMsg('user', msg);
  const aiMsg = appendMsg('ai', '');
  const aiBody = aiMsg.querySelector('.body');
  const aiMeta = aiMsg.querySelector('.meta');
  aiBody.innerHTML = '<span class="cursor">&nbsp;</span>';

  try {
    const resp = await fetch(`/api/virtual-humans/${VH_ID}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, conversationId })
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const reply = await resp.json();
    aiBody.textContent = reply.text;
    conversationId = reply.conversationId;
    convIdLabel.textContent = reply.conversationId;
    aiMeta.textContent = `${reply.durationMs}ms · pTok ${reply.promptTokens} · cTok ${reply.completionTokens}`;
    chat.scrollTop = chat.scrollHeight;
  } catch (e) {
    aiBody.textContent = '出错: ' + e.message;
  } finally {
    btn.disabled = false;
    input.focus();
  }
}

input.focus();
</script>
</body>
</html>
